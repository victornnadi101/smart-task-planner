<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Smart Task Planner</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!-- External CSS -->
        <link rel="stylesheet" href="/styles.css">
    </head>

    <body>
    <!-- =========================
         APP TITLE
         =========================
    -->
    <h1 class="app-title">Smart Task Planner</h1>

    <!-- =================
         SIGNUP SECTION
         =================
    -->
    <div id="signupPage" class="container" style="display:none;">

        <h2>📝 Sign Up</h2>

        <label for="signupUsername">Username:</label><br>
        <input id="signupUsername"><br><br>

        <label for="signupPassword">Password:</label><br>
        <input id="signupPassword" type="password"><br><br>

        <button type="button" onclick="registerUser()">Create Account</button>
        <button onclick="showLogin()">Back to Login</button>

    </div>
    <!-- =================
         LOGIN SECTION
         =================
    -->
    <div id="loginSection" class="container">

        <h2>🔐 Login</h2>

        <!-- Username input -->
        <label for="loginUsername">Username:</label><br>
        <input id="loginUsername" placeholder="Enter username"><br><br>

        <!-- Password input -->
        <label for="loginPassword">Password:</label><br>
        <input id="loginPassword" type="password" placeholder="Enter password"><br><br>

        <!-- Login button -->
        <button onclick="loginUser()">Login</button>

        <!-- Signup button -->
        <p>Don't have an account?</p>
        <button onclick="showSignup()">Sign Up</button>
    </div>

    <!-- =================
         DASHBOARD SECTION
         =================
    -->
    <div id="dashboardPage" class="container dashboard" style="display:none;">

        <h2>📊 Dashboard</h2>

        <button onclick="showAdd()">Add Tasks</button>
        <button onclick="showTasks()">View Tasks</button>
        <button onclick="logoutUser()">Logout</button>

    </div>

    <div id="appSection" style="display:none;">
        <div class="container">
            <!-- =========================
                 NOTIFICATION SETTINGS
                 =========================
            -->
            <h2>🔔 Notification Settings</h2>
            <div class="settings">
                <label class="checkbox">
                    <input type="checkbox" id="notify1" checked>
                    <span>1 Day Before</span>
                </label>

                <label class="checkbox">
                    <input type="checkbox" id="notify3" checked>
                    <span>3 Days Before</span>
                </label>
            </div>

        <!-- =========================
             ADD TASK SECTION
             =========================
        -->
        <h2>➕ Add Task</h2>

        <!-- Title -->
        <label for="title">Title:</label><br>
        <input id="title" placeholder="Enter task title"><br><br>

        <!-- Description -->
        <label for="description">Description:</label><br>
        <input id="description" placeholder="Enter description"><br><br>

        <!-- Due Date -->
        <label for="dueDate">Due Date:</label><br>
        <input id="dueDate" type="date"><br><br>

        <!-- Priority -->
        <label for="priority">Priority:</label><br>
            <div class="priority-buttons">
                <button type="button" onclick="setPriority('HIGH')" id="pHigh">HIGH</button>
                <button type="button" onclick="setPriority('MEDIUM')" id="pMedium">MEDIUM</button>
                <button type="button" onclick="setPriority('LOW')" id="pLow">LOW</button>
            </div>
            <input type="hidden" id="priority">
        <button onclick="addTask()">Add Task</button>
        <button onclick="showDashboard()">Back</button>

        <!-- =========================
             TASK DISPLAY
             =========================
        -->
        </div>
    </div>

    <!-- Tasks page -->
    <div id="tasksPage" style="display:none;">
        <div class="main-layout">
            <!-- LEFT SIDE - TASK LIST -->
            <div class="tasks-container">
                <h2>📌 Tasks</h2>
                <button onclick="showDashboard()">Back</button>
                <button onclick="goToNotifications()">🔔 Notifications</button>
                <button onclick="deleteAllTasks()">🗑 Clear All Tasks</button>
                <input
                        type="text"
                        id="searchTask"
                        placeholder="Search tasks..."
                        onkeyup="filterTasks()"
                >
                <div id="taskList" class="task-list"></div>
            </div>

            <!-- RIGHT SIDE - NOTIFICATIONS PANEL -->
            <div class="notification-panel">
                <h3>🔔 Notifications</h3>
                <div id="toastContainer"></div>
            </div>
        </div>
    </div>
        <script>
            function showLogin() {
                hideAll();
                document.getElementById("loginSection").style.display = "block";
            }

            function showSignup() {
                hideAll();
                document.getElementById("signupPage").style.display = "block";
            }

            function showDashboard() {
                hideAll();
                document.getElementById("dashboardPage").style.display = "block";
            }

            function showAdd() {
                hideAll();
                document.getElementById("appSection").style.display = "block";
            }

            function showTasks() {
                hideAll();
                document.getElementById("tasksPage").style.display = "block";
                loadTasks();
            }

            function hideAll() {
                document.getElementById("loginSection").style.display = "none";
                document.getElementById("signupPage").style.display = "none";
                document.getElementById("dashboardPage").style.display = "none";
                document.getElementById("appSection").style.display = "none";
                document.getElementById("tasksPage").style.display = "none";
            }

            function loginUser() {
                const username = document.getElementById("loginUsername").value.trim();
                const password = document.getElementById("loginPassword").value.trim();

                if (!username || !password) {
                    showPopup("Enter username and password");
                    return;
                }

                fetch(`${BASE_URL}/users/login?username=${username}&password=${password}`)
                    .then(res => res.json())
                    .then(data => {
                        console.log("LOGIN RESPONSE:", data);

                        if (data.success === true) {
                            currentUser = username;
                            showPopup("Login successful!");
                            showDashboard();
                        } else {
                            showPopup(data.message || "Login failed");
                        }
                    })
                    .catch(err => {
                        console.error("Login error:", err);
                        showPopup("Login failed.");
                    });
            }

            function logoutUser() {
                currentUser = "";
                showPopup("Logged out successfully");
                showLogin();
            }

            function registerUser() {
                const username = document.getElementById("signupUsername").value.trim();
                const password = document.getElementById("signupPassword").value.trim();

                if (!username || !password) {
                    showPopup("Username and password required");
                    return;
                }

                fetch(`${BASE_URL}/users/register?username=${username}&password=${password}`)
                    .then(res => res.json())
                    .then(data => {
                        console.log("REGISTER DATA:", data);

                        showPopup(data.message || "Signup response");

                        showLogin();
                        document.getElementById("signupUsername").value = "";
                        document.getElementById("signupPassword").value = "";
                    })
                    .catch(err => {
                        console.error("REGISTER ERROR:", err);
                        showPopup("Signup failed");
                    });
            }

            const BASE_URL = "https://smart-task-planner-7csu.onrender.com";
            /* =========================
               GLOBAL VARIABLES
               =========================
            */
            let currentUser = "";
            let shownAlerts = new Set();

            /* =========================
               SET MIN DATE AFTER PAGE LOAD
               =========================
            */
            window.onload = function () {
                document.getElementById("dueDate").min =
                    new Date().toISOString().split("T")[0];
            };

            /* =========================
               IN-APP NOTIFICATIONS
               =========================
            */
            function showToast(message) {
                const container = document.getElementById("toastContainer");

                const toast = document.createElement("div");
                toast.className = "toast";
                toast.innerText = message;

                container.appendChild(toast);
            }

            /* =========================
               ADD TASK FUNCTION
               =========================
            */
            function addTask() {
                if (!currentUser) {
                    showToast("You must login first.");
                    return;
                }

                const title = document.getElementById("title").value.trim();
                const description = document.getElementById("description").value.trim();
                const dueDate = document.getElementById("dueDate").value;
                const priority = document.getElementById("priority").value.trim();

                // Validation
                if (!title) return showPopup("Please enter a task title.");
                if (!dueDate) return showPopup("Please select a due date.");
                if (!priority) return showPopup("Please choose a priority.");

                const data = {
                    username: currentUser,
                    title,
                    description,
                    dueDate,
                    priority
                };

                // Check duplicate
                const existingTasks = document.querySelectorAll(".task-title");

                let duplicate = false;

                existingTasks.forEach(task => {
                    if (task.innerText.includes(title)) {
                        duplicate = true;
                    }
                });

                if (duplicate) {
                    const confirmAdd = confirm("This task already exists. Add anyway?");
                    if (!confirmAdd) return;
                }

                fetch(`${BASE_URL}/tasks/add`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify(data)
                })
                    .then(res => res.json())
                    .then(response => showPopup(response.message));
            }

            function showPopup(message) {
                const popup = document.createElement("div");
                popup.className = "popup";
                popup.innerText = message;

                document.body.appendChild(popup);

                setTimeout(() => popup.remove(), 2000);
            }

            /* =================
               NOTIFICATIONS
               =================
            */
            function goToNotifications() {
                document.querySelector(".notification-panel")
                    .scrollIntoView({ behavior: "smooth" });
            }

            /* =========================
               LOAD TASKS
               =========================
            */
            function loadTasks() {
                fetch(`${BASE_URL}/tasks/view?username=${currentUser}`)
                    .then(res => res.json())
                    .then(tasks => {
                        const searchValue = document
                            .getElementById("searchTask")
                            .value
                            .toLowerCase();

                        const list = document.getElementById("taskList");
                        list.innerHTML = "";

                        if (!tasks || tasks.length === 0) {
                            list.innerHTML = "<p>No tasks found.</p>";

                            checkDeadlines([]);
                            return;
                        }

                        tasks = tasks.filter(task =>
                            task.title.toLowerCase().includes(searchValue) ||
                            String(task.id || task.taskId).includes(searchValue)
                        );

                        // Sort by priority
                        tasks.sort((a, b) => {

                            if (a.status === "COMPLETED" && b.status !== "COMPLETED") {
                                return 1;
                            }

                            if (a.status !== "COMPLETED" && b.status === "COMPLETED") {
                                return -1;
                            }

                            const priorityOrder = {
                                HIGH: 1,
                                MEDIUM: 2,
                                LOW: 3
                            };

                            if (priorityOrder[a.priority] !== priorityOrder[b.priority]) {
                                return priorityOrder[a.priority] - priorityOrder[b.priority];
                            }

                            return new Date(a.dueDate) - new Date(b.dueDate);
                        });

                        const today = new Date();

                        tasks.forEach(task => {
                            const due = new Date(task.dueDate);

                            // =========================
                            // PRIORITY COLOR
                            // =========================
                            let priorityColor = "#000";

                            if (task.priority === "HIGH") priorityColor = "#e53935";      // red
                            else if (task.priority === "MEDIUM") priorityColor = "#fb8c00"; // orange
                            else if (task.priority === "LOW") priorityColor = "#43a047";    // green


                            // =========================
                            // STATUS COLOR
                            // =========================
                            let statusColor = "#fb8c00"; // pending = orange

                            if (task.status === "COMPLETED") {
                                statusColor = "#43a047"; // green
                            }
                            const div = document.createElement("div");
                            div.className = "task-card";

                            div.innerHTML = `
                                <span class="task-title">📌 ${task.title}</span>
                                <span class="task-date">📅 ${task.dueDate}</span>

                                <span class="task-priority" style="color:${priorityColor}; font-weight:bold;">
                                    ${task.priority}
                                </span>

                                <span class="task-status" style="color:${statusColor}; font-weight:bold;">
                                    ${task.status}
                                </span>

                                <div class="task-actions">
                                    <button class="done-btn" onclick="completeTask(${task.id || task.taskId})">✔</button>
                                    <button class="delete-btn" onclick="deleteTask(${task.id || task.taskId})">🗑</button>
                                </div>
                            `;
                            list.appendChild(div);
                        });
                        checkDeadlines(tasks);
                    });
            }

            function filterTasks() {
                const searchValue = document
                    .getElementById("searchTask")
                    .value
                    .toLowerCase();

                const cards = document.querySelectorAll(".task-card");

                cards.forEach(card => {
                    const text = card.innerText.toLowerCase();

                    if (text.includes(searchValue)) {
                        card.style.display = "grid";
                    } else {
                        card.style.display = "none";
                    }
                });
            }

            function searchTasks() {
                const keyword = document.getElementById("searchInput")
                    .value
                    .toLowerCase();

                const tasks = document.querySelectorAll(".task-card");

                tasks.forEach(task => {
                    const text = task.innerText.toLowerCase();

                    if (text.includes(keyword)) {
                        task.style.display = "flex";
                    } else {
                        task.style.display = "none";
                    }
                });
            }

            function setPriority(level) {

                document.getElementById("priority").value = level;

                document.querySelectorAll(".priority-buttons button")
                    .forEach(btn => btn.classList.remove("active"));

                document.getElementById("p" + level.charAt(0) + level.slice(1).toLowerCase())
                    .classList.add("active");
            }

            /* =========================
               COMPLETE TASK
               =========================
            */
            function completeTask(id) {
                if (!id) {
                    console.error("Invalid ID:", id);
                    showPopup("Error: Task ID missing");
                    return;
                }

                if (!confirm("Mark task as completed?")) return;

                fetch(`${BASE_URL}/tasks/complete?id=${id}`)
                    .then(res => res.json())
                    .then(data => {
                        showPopup(data.message || "Task completed successfully");
                        loadTasks();
                    })
                    .catch(err => {
                        console.error(err);
                        showPopup("Error completing task");
                    });
            }

            /* =========================
               DELETE TASK
               =========================
            */
            function deleteTask(id) {
                if (!id) {
                    console.error("Invalid ID:", id);
                    showPopup("Error: Task ID missing");
                    return;
                }

                if (!confirm("Are you sure you want to delete this task?")) return;

                fetch(`${BASE_URL}/tasks/delete?id=${id}`)
                    .then(res => res.json())
                    .then(data => {
                        showPopup(data.message || "Task deleted successfully");
                        loadTasks();
                    })
                    .catch(err => {
                        console.error(err);
                        showPopup("Error deleting task");
                    });
            }

            function deleteAllTasks() {
                if (!confirm("Delete ALL tasks? This cannot be undone.")) return;

                fetch(`${BASE_URL}/tasks/deleteAll?username=${currentUser}`, {
                    method: "DELETE"
                })
                    .then(res => res.json())
                    .then(data => {
                        showPopup(data.message || "All tasks deleted successfully");

                        // Refresh everything
                        loadTasks();
                    })
                    .catch(err => {
                        console.error(err);
                        showPopup("Error deleting all tasks");
                    });
            }

            /* =========================
               NOTIFICATIONS
               =========================
            */
            function checkDeadlines(tasks) {
                const today = new Date();
                const notify1 = document.getElementById("notify1").checked;
                const notify3 = document.getElementById("notify3").checked;

                const container = document.getElementById("toastContainer");

                // CLEAR OLD NOTIFICATIONS EVERY TIME
                container.innerHTML = "";

                tasks.forEach(task => {
                    if (task.status === "COMPLETED") return;

                    const due = new Date(task.dueDate);
                    const diff = Math.ceil((due - today) / (1000 * 60 * 60 * 24));

                    if (notify1 && diff === 1) {
                        showToast(`⚠ Due tomorrow: ${task.title}`);
                    }

                    if (notify3 && diff === 3) {
                        showToast(`📅 Due in 3 days: ${task.title}`);
                    }
                });
            }
        </script>
    </body>
</html>
