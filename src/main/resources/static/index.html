<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Smart Task Planner</title>
        <link rel="stylesheet" href="/styles.css">
    </head>
    <body>
    <!-- Main Title -->
    <h1>Smart Task Planner</h1>

    <!-- Notifications -->
    <h2>Notification Settings</h2>
    <label>
        <input type="checkbox" id="notify1" checked>
        Notify 1 day before
    </label><br>

    <label>
        <input type="checkbox" id="notify3" checked>
        Notify 3 days before
    </label><br><br>

    <!-- Section: Add Task -->
    <h2>Add Task</h2>

    <!-- Input fields for task details -->
    <!-- Username -->
    <label for="username">Username:</label><br>
    <input id="username" placeholder="Enter username" required><br><br>

    <!-- Title -->
    <label for="title">Title:</label><br>
    <input id="title" placeholder="Enter task title" required><br><br>

    <!-- Description -->
    <label for="description">Description:</label><br>
    <input id="description" placeholder="Enter description"><br><br>

    <!-- Due Date -->
    <label for="dueDate">Due Date:</label><br>
    <input id="dueDate" type="date" required><br><br>

    <!-- Priority -->
    <label for="priority">Priority:</label><br>
    <input id="priority" placeholder="HIGH / MEDIUM / LOW" required><br><br>

    <!-- Button to send task to backend -->
    <button onclick="addTask()">Add Task</button>

    <!-- Section: View Tasks -->
    <h2>Tasks</h2>

    <!-- Button to load tasks from backend -->
    <button onclick="loadTasks()">Load Tasks</button>

    <!-- List where tasks will be displayed -->
    <div id="taskList"></div>
        <script>
            let shownAlerts = new Set();

            // Prevent past dates
            document.getElementById("dueDate").min = new Date().toISOString().split("T")[0];

            // Function to send task data to backend API
            function addTask() {
                // Get values
                const username = document.getElementById("username").value.trim();
                const title = document.getElementById("title").value.trim();
                const description = document.getElementById("description").value.trim();
                const dueDate = document.getElementById("dueDate").value;
                const priority = document.getElementById("priority").value.trim();

                // Field-specific validation
                if (!username) {
                    alert("Username is required.");
                    return;
                }

                if (!title) {
                    alert("Title is required.");
                    return;
                }

                if (!dueDate) {
                    alert("Due Date is required.");
                    return;
                }

                if (!priority) {
                    alert("Priority is required.");
                    return;
                }

                // Build request
                const data = {
                    username,
                    title,
                    description,
                    dueDate,
                    priority
                };

                // Send POST request to backend
                fetch("http://localhost:8080/tasks/add", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(data)
                })
                    .then(res => res.json())
                    .then(response => {
                        alert(response.message); // Show success message
                    });
            }

            // Function to load tasks from backend
            function loadTasks() {
                const username = document.getElementById("username").value.trim();

                if (!username) {
                    alert("Username is required to load tasks.");
                    return;
                }

                fetch(`http://localhost:8080/tasks/view?username=${username}`)
                    .then(res => res.json())
                    .then(tasks => {

                        const list = document.getElementById("taskList");
                        list.innerHTML = "";

                        if (!Array.isArray(tasks) || tasks.length === 0) {
                            list.innerHTML = "<p>No tasks found.</p>";
                            return;
                        }

                        // Sort priority
                        tasks.sort((a, b) => {
                            const order = { HIGH: 1, MEDIUM: 2, LOW: 3 };
                            return order[a.priority] - order[b.priority];
                        });

                        tasks.forEach(task => {

                            const today = new Date();
                            const due = new Date(task.dueDate);

                            // Default
                            let color = "black";

                            // PRIORITY COLORS
                            if (task.priority === "HIGH") color = "red";
                            if (task.priority === "MEDIUM") color = "orange";
                            if (task.priority === "LOW") color = "green";

                            // STATUS OVERRIDE
                            if (task.status === "COMPLETED") {
                                color = "green";
                            }

                            // OVERDUE (Only if still pending)
                            if (task.status === "PENDING" && due < today) {
                                color = "red";
                            }

                            // UPCOMING (pending but not overdue)
                            if (task.status === "PENDING" && due >= today) {
                                color = "orange";
                            }
                            const div = document.createElement("div");

                            div.style.border = "1px solid #ccc";
                            div.style.padding = "10px";
                            div.style.margin = "10px";
                            div.style.borderRadius = "5px";

                            div.innerHTML = `
                                <p><strong>${task.title}</strong></p>
                                <p>${task.description}</p>
                                <p>Due: ${task.dueDate}</p>
                                <p style="color:${color}; font-weight:bold;">
                                    Priority: ${task.priority}
                                </p>
                                <p style="color:${color}; font-weight:bold;">
                                    Status: ${task.status}
                                </p>

                                <button onclick="completeTask(${task.taskId})">Complete</button>
                                <button onclick="deleteTask(${task.taskId})">Delete</button>
                            `;

                            list.appendChild(div);
                        });

                        // Call Notifications
                        checkDeadlines(tasks);
                    });
            }

            function completeTask(taskId) {
                fetch(`http://localhost:8080/tasks/complete?id=${taskId}`)
                    .then(res => res.json())
                    .then(data => {
                        alert(data.message);
                        loadTasks(); // refresh list
                    });
            }

            function deleteTask(taskId) {
                fetch(`http://localhost:8080/tasks/delete?id=${taskId}`)
                    .then(res => res.json())
                    .then(data => {
                        alert(data.message);
                        loadTasks(); // refresh list
                    });
            }

            function checkDeadlines(tasks) {
                const today = new Date();

                const notify1 = document.getElementById("notify1").checked;
                const notify3 = document.getElementById("notify3").checked;

                tasks.forEach(task => {

                    if (task.status === "COMPLETED") return;

                    const due = new Date(task.dueDate);
                    const diffDays = Math.ceil((due - today) / (1000 * 60 * 60 * 24));
                    const key = task.taskId + "-" + diffDays;

                    if (shownAlerts.has(key)) return;
                    shownAlerts.add(key);

                    // Overdue
                    if (diffDays < 0) {
                        alert(`❗ OVERDUE: "${task.title}"`);
                    }

                    // 1-day notification
                    if (notify1 && diffDays === 1) {
                        alert(`⚠️ "${task.title}" is due in 1 day!`);
                    }

                    // 3-day notification
                    if (notify3 && diffDays === 3) {
                        alert(`📅 "${task.title}" is due in 3 days!`);
                    }
                });
            }
        </script>
    </body>
</html>
