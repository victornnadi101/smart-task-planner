<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Smart Task Planner</title>

        <!-- External CSS -->
        <link rel="stylesheet" href="/styles.css">
    </head>

    <body>
    <!-- =========================
         APP TITLE
         =========================
    -->
    <h1 class="app-title">Smart Task Planner</h1>

    <!-- =================
         SIGNUP SECTION
         =================
    -->
    <div id="signupPage" class="container" style="display:none;">

        <h2>📝 Sign Up</h2>

        <label>Username:</label><br>
        <input id="signupUsername"><br><br>

        <label>Password:</label><br>
        <input id="signupPassword" type="password"><br><br>

        <button onclick="registerUser()">Create Account</button>
        <button onclick="showLogin()">Back to Login</button>

    </div>
    <!-- =================
         LOGIN SECTION
         =================
    -->
    <div id="loginSection" class="container">

        <h2>🔐 Login</h2>

        <!-- Username input -->
        <label for="loginUsername">Username:</label><br>
        <input id="loginUsername" placeholder="Enter username"><br><br>

        <!-- Password input -->
        <label for="loginPassword">Password:</label><br>
        <input id="loginPassword" type="password" placeholder="Enter password"><br><br>

        <!-- Login button -->
        <button onclick="loginUser()">Login</button>

    </div>

    <!-- =================
         DASHBOARD SECTION
         =================
    -->
    <div id="dashboardPage" class="container" style="display:none;">

        <h2>📊 Dashboard</h2>

        <button onclick="showAdd()">Add Task</button>
        <button onclick="showTasks()">View Tasks</button>

    </div>

    <div id="appSection" style="display:none;">
        <div class="container">
            <!-- =========================
                 NOTIFICATION SETTINGS
                 =========================
            -->
            <h2>🔔 Notification Settings</h2>
            <div class="settings">
                <label class="checkbox">
                    <input type="checkbox" id="notify1" checked>
                    1 Day Before
                </label>

                <label class="checkbox">
                    <input type="checkbox" id="notify3" checked>
                    3 Days Before
                </label>
            </div>

        <!-- =========================
             ADD TASK SECTION
             =========================
        -->
        <h2>➕ Add Task</h2>

        <!-- Title -->
        <label for="title">Title:</label><br>
        <input id="title" placeholder="Enter task title"><br><br>

        <!-- Description -->
        <label for="description">Description:</label><br>
        <input id="description" placeholder="Enter description"><br><br>

        <!-- Due Date -->
        <label for="dueDate">Due Date:</label><br>
        <input id="dueDate" type="date"><br><br>

        <!-- Priority -->
        <label for="priority">Priority:</label><br>
        <input id="priority" placeholder="HIGH / MEDIUM / LOW"><br><br>

        <button onclick="addTask()">Add Task</button>
        <button onclick="showDashboard()">Back</button>

        <!-- =========================
             TASK DISPLAY
             =========================
        -->
            <div id="tasksPage" class="container" style="display:none;">
                <h2>📌 Tasks</h2>
                <button onclick="loadTasks()">Load Tasks</button>
                <button onclick="showDashboard()">Back</button>
                <div id="taskList"></div>
            </div>
        </div>
    </div>
        <script>
            function showLogin() {
                hideAll();
                document.getElementById("loginPage").style.display = "block";
            }

            function showSignup() {
                hideAll();
                document.getElementById("signupPage").style.display = "block";
            }

            function showDashboard() {
                hideAll();
                document.getElementById("dashboardPage").style.display = "block";
            }

            function showAdd() {
                hideAll();
                document.getElementById("addPage").style.display = "block";
            }

            function showTasks() {
                hideAll();
                document.getElementById("tasksPage").style.display = "block";
            }

            function hideAll() {
                document.getElementById("loginPage").style.display = "none";
                document.getElementById("signupPage").style.display = "none";
                document.getElementById("dashboardPage").style.display = "none";
                document.getElementById("addPage").style.display = "none";
                document.getElementById("tasksPage").style.display = "none";
            }

            function registerUser() {
                const username = document.getElementById("signupUsername").value;
                const password = document.getElementById("signupPassword").value;

                fetch(`http://localhost:8080/users/register?username=${username}&password=${password}`)
                    .then(res => res.json())
                    .then(data => {
                        alert(data.message);
                        showLogin();
                    });
            }

            let currentUser = "";

            function loginUser() {
                const username = document.getElementById("loginUsername").value;
                const password = document.getElementById("loginPassword").value;

                fetch(`http://localhost:8080/users/login?username=${username}&password=${password}`)
                    .then(res => res.json())
                    .then(data => {

                        if (data.success) {
                            currentUser = username;
                            alert("Login successful!");
                            showDashboard();
                        } else {
                            alert("Invalid login.");
                        }
                    });
            }

            /* =========================
               GLOBAL VARIABLES
               =========================
            */
            let shownAlerts = new Set();

            /* =========================
               SET MIN DATE AFTER PAGE LOAD
               =========================
            */
            window.onload = function () {
                document.getElementById("dueDate").min =
                    new Date().toISOString().split("T")[0];
            };

            /* =========================
               ADD TASK FUNCTION
               =========================
            */
            function addTask() {
                const title = document.getElementById("title").value.trim();
                const description = document.getElementById("description").value.trim();
                const dueDate = document.getElementById("dueDate").value;
                const priority = document.getElementById("priority").value.trim();

                // Validation
                if (!title) return alert("Title is required.");
                if (!dueDate) return alert("Due Date is required.");
                if (!priority) return alert("Priority is required.");

                const data = {
                    username: currentUser,
                    title,
                    description,
                    dueDate,
                    priority
                };

                fetch("http://localhost:8080/tasks/add", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify(data)
                })
                    .then(res => res.json())
                    .then(response => alert(response.message));
            }

            /* =========================
               LOAD TASKS
               =========================
            */
            function loadTasks() {
                fetch(`http://localhost:8080/tasks/view?username=testuser`)
                    .then(res => res.json())
                    .then(tasks => {
                        const list = document.getElementById("taskList");
                        list.innerHTML = "";

                        if (!tasks.length) {
                            list.innerHTML = "<p>No tasks found.</p>";
                            return;
                        }

                        // Sort by priority
                        tasks.sort((a, b) => {
                            const order = {HIGH: 1, MEDIUM: 2, LOW: 3};
                            return order[a.priority] - order[b.priority];
                        });

                        const today = new Date();

                        tasks.forEach(task => {
                            const due = new Date(task.dueDate);
                            let color = "orange";

                            if (task.status === "COMPLETED") color = "green";
                            else if (due < today) color = "red";

                            const div = document.createElement("div");
                            div.className = "task-card";

                            div.innerHTML = `
                                <h3>📌 ${task.title}</h3>
                                <p>${task.description}</p>
                                <p>📅 Due: ${task.dueDate}</p>
                                <p style="color:${color}; font-weight:bold;">
                                    Status: ${task.status}
                                </p>

                                <button onclick="completeTask(${task.taskId})">✔ Complete</button>
                                <button onclick="deleteTask(${task.taskId})">🗑 Delete</button>
                            `;
                            list.appendChild(div);
                        });
                        checkDeadlines(tasks);
                    });
            }

            /* =========================
               COMPLETE TASK
               =========================
            */
            function completeTask(id) {
                if (!confirm("Mark task as completed?")) return;

                fetch(`http://localhost:8080/tasks/complete?id=${id}`)
                    .then(res => res.json())
                    .then(() => loadTasks());
            }

            /* =========================
               DELETE TASK
               ========================= */
            function deleteTask(id) {
                if (!confirm("Delete this task?")) return;

                fetch(`http://localhost:8080/tasks/delete?id=${id}`)
                    .then(res => res.json())
                    .then(() => loadTasks());
            }

            /* =========================
               NOTIFICATIONS
               =========================
            */
            function checkDeadlines(tasks) {
                const today = new Date();
                const notify1 = document.getElementById("notify1").checked;
                const notify3 = document.getElementById("notify3").checked;

                tasks.forEach(task => {
                    if (task.status === "COMPLETED") return;

                    const due = new Date(task.dueDate);
                    const diff = Math.ceil((due - today) / (1000 * 60 * 60 * 24));

                    const key = task.taskId + "-" + diff;
                    if (shownAlerts.has(key)) return;
                    shownAlerts.add(key);

                    if (diff < 0) alert(`❗ OVERDUE: ${task.title}`);
                    if (notify1 && diff === 1) alert(`⚠️ Due tomorrow: ${task.title}`);
                    if (notify3 && diff === 3) alert(`📅 Due in 3 days: ${task.title}`);
                });
            }
        </script>
    </body>
</html>
